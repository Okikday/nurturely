name: nurturely
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  
  flutter_riverpod: ^3.0.0
  custom_widgets_toolkit: ^0.0.76
  iconsax_flutter: ^1.0.0
  flutter_animate: ^4.5.2
  uuid: ^4.5.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.2.4
  go_router: ^16.2.4
  another_flushbar: ^1.12.32

  path_provider: ^2.1.5
  cached_network_image: ^3.4.1
  collection: any

  intl: any
  crypto: ^3.0.6
  google_fonts: ^6.2.1
  skeletonizer: ^2.1.0+1
  flutter_dotenv: ^6.0.0

  # firebase_ai: ^3.2.0
  # google_sign_in: ^7.2.0
  # cloud_firestore: ^6.0.0
  # firebase_auth: ^6.0.1
  # firebase_core: ^4.1.0
  # firebase_database: ^12.0.0


  flutter_chat_ui: ^2.9.0
  flutter_streaming_text_markdown: ^1.3.2
  flutter_chat_core: ^2.8.0

flutter_native_splash:
  android: true
  ios: true

  color: "#FCFAFE"
  image: "assets/logo/splash.png"
  color_dark: "#0B0B10"
  image_dark: "assets/logo/splash.png"

  android_12:
    color: "#FCFAFE"
    image: "assets/logo/splash.png"
    color_dark: "#0B0B10"
    image_dark: "assets/logo/splash.png"

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logo/ic_foreground.png"
  android_adaptive_icon:
    # background_color: "#5000B8"
    foreground_image: "assets/logo/ic_background.png"
  remove_alpha_ios: true


dev_dependencies:
  flutter_test:
    sdk: flutter
  
  flutter_lints: ^5.0.0

  flutter_native_splash: ^2.4.6
  flutter_launcher_icons: ^0.14.4

  riverpod_lint: ^2.6.5

flutter:
  uses-material-design: true

  assets:
    - assets/fonts/
    - assets/icons/
    - assets/images/
    - assets/logo/
    - .env



  #-FONTS
  fonts:
    - family: Nunito
      fonts:
        - asset: assets/fonts/Nunito-Light.ttf
          weight: 300
        - asset: assets/fonts/Nunito-LightItalic.ttf
          weight: 300
          style: italic

        - asset: assets/fonts/Nunito-Regular.ttf
          weight: 400
        - asset: assets/fonts/Nunito-Italic.ttf
          weight: 400
          style: italic

        - asset: assets/fonts/Nunito-Medium.ttf
          weight: 500
        - asset: assets/fonts/Nunito-MediumItalic.ttf
          weight: 500
          style: italic

        - asset: assets/fonts/Nunito-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Nunito-SemiBoldItalic.ttf
          weight: 600
          style: italic

        - asset: assets/fonts/Nunito-Bold.ttf
          weight: 700
        - asset: assets/fonts/Nunito-BoldItalic.ttf
          weight: 700
          style: italic

        - asset: assets/fonts/Nunito-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/Nunito-ExtraBoldItalic.ttf
          weight: 800
          style: italic

        - asset: assets/fonts/Nunito-Black.ttf
          weight: 900
        - asset: assets/fonts/Nunito-BlackItalic.ttf
          weight: 900
          style: italic

